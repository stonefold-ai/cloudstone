# Local cloud-shaped run: gateway + Postgres. For the zero-dependency local
# run, skip compose entirely and use `mvn spring-boot:run` (H2).
services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      GATEWAY_DB_URL: jdbc:postgresql://db:5432/gateway
      GATEWAY_DB_USER: gateway
      GATEWAY_DB_PASSWORD: gateway
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
