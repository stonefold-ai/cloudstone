spring:
  application:
    name: stonefold-gateway
  profiles:
    default: local
  flyway:
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/{liveness,readiness} for k8s

---
# Local: no external services. H2 in Postgres mode, file-backed so state
# survives a restart during development. H2 has no jsonb, so JSON audit
# bodies are stored as text here.
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./.local/gateway;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
  flyway:
    placeholders:
      json_type: text

# Tenants are seeded from config in the local profile. Only key HASHES go
# here (generate a pair with the GenerateApiKey helper); the plaintext key
# stays with the caller. With no tenants configured, a 'dev' tenant is
# auto-seeded at startup and its key printed once to the console.
#
# stonefold:
#   tenants:
#     - id: acme
#       display-name: Acme Corp
#       key-hashes:
#         - "<base64url sha-256 of the api key>"

---
# Cloud: everything injected from the environment; the image contains no
# secrets and no environment-specific values.
spring:
  config:
    activate:
      on-profile: cloud
  datasource:
    url: ${GATEWAY_DB_URL}
    username: ${GATEWAY_DB_USER}
    password: ${GATEWAY_DB_PASSWORD}
  flyway:
    placeholders:
      json_type: jsonb
