# Build and test on every push to main and every PR. Java 17 is the compile
# floor the project builds on today; 21 is the runtime the Docker image
# targets. The image itself is not built here yet — verifying the Docker
# build belongs to the operations phase of the roadmap.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# The build only reads the repo; a read-only token caps the blast radius
# if a third-party action release is ever compromised.
permissions:
  contents: read

# Supersede obsolete runs of the same ref instead of stacking them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # Let both JDK legs finish: the matrix exists to tell WHICH version
      # broke, and cancelling the sibling destroys exactly that signal.
      fail-fast: false
      matrix:
        java: ['17', '21']
    name: JDK ${{ matrix.java }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      # The wrapper pins the Maven version; the runner's preinstalled Maven
      # drifts with the ubuntu-latest image.
      - run: ./mvnw -B -ntp verify
